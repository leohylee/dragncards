name: CI

# Disabled 2026-05-29: this stale workflow (Elixir 1.9 / OTP 22 / postgres:11 / deprecated
# @v1.0.0 actions) failed at "Initialize containers" on every push, before any test ran.
# Switched to manual-only so it no longer runs automatically. To re-enable, restore `on: push`
# (and ideally first modernize: actions/checkout@v4 + erlef/setup-beam Elixir 1.14/OTP 26 + postgres:16).
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:11
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v1.0.0
      - uses: actions/setup-elixir@v1.0.0
        with:
          otp-version: 22.x
          elixir-version: 1.9.x
      - run: mix deps.get
        working-directory: ./backend
      - run: mix test
        working-directory: ./backend
