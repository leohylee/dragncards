services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    image: elixir:1.14.4
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
    entrypoint: /app/scripts/local-dev.sh
    working_dir: /app
    environment:
      - DB_HOSTNAME=postgres
  frontend:
    image: node:20-alpine
    container_name: dragncards-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
      # Use the host machine's LAN IP (not 127.0.0.1) so the realtime game
      # socket works from other devices (e.g. an iPad). 127.0.0.1 resolves to
      # whatever device the browser runs on, so loopback only works on this PC.
      # Update this if your LAN IP changes (find it with `ipconfig getifaddr en0`).
      - REACT_APP_WS_URL=ws://192.168.50.38:4000/socket
      - REACT_APP_BE_HOSTNAME=backend
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=3000
    depends_on:
      - backend
    command: sh -c "npm install --legacy-peer-deps --prefer-offline --no-audit --no-fund || echo 'npm install failed (offline?); reusing existing node_modules volume'; npm start"
    stdin_open: true
    tty: true
#uncomment apache if you're running pure offline mode. Other steps required
#   apache:
#     image: httpd:latest
#     container_name: my-apache-app
#     ports:
#     - '8080:80'
#     volumes:
#     - ./images:/usr/local/apache2/htdocs
volumes:
  pgdata:
  frontend-node-modules:
